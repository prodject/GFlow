name: Android prerelease

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"

      - name: Resolve next prerelease version
        id: version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          latest="$(
            gh release list \
              --repo "$GITHUB_REPOSITORY" \
              --exclude-drafts \
              --json tagName,isPrerelease \
              --jq '[.[] | select(.isPrerelease == true) | .tagName | capture("^v1\\.(?<minor>[0-9]+)$")? | .minor | tonumber] | max // -1'
          )"
          next_minor=$((latest + 1))
          version_name="1.${next_minor}"
          version_code=$((100 + next_minor))
          echo "version_name=${version_name}" >> "$GITHUB_OUTPUT"
          echo "version_code=${version_code}" >> "$GITHUB_OUTPUT"
          echo "tag_name=v${version_name}" >> "$GITHUB_OUTPUT"

      - name: Prepare release keystore
        env:
          RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
        run: |
          if [ -n "$RELEASE_KEYSTORE_BASE64" ]; then
            echo "$RELEASE_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/gflow-release.keystore"
          fi

      - name: Build APK
        env:
          VERSION_NAME: ${{ steps.version.outputs.version_name }}
          VERSION_CODE: ${{ steps.version.outputs.version_code }}
          RELEASE_KEYSTORE_PATH: ${{ runner.temp }}/gflow-release.keystore
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: gradle assembleRelease

      - name: Rename APK
        run: cp app/build/outputs/apk/release/app-release.apk GFlow-${{ steps.version.outputs.version_name }}.apk

      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag_name }}
          name: GFlow ${{ steps.version.outputs.version_name }}
          files: GFlow-${{ steps.version.outputs.version_name }}.apk
          prerelease: true
          make_latest: false
          generate_release_notes: true
